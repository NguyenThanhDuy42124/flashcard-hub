[global]
# Force pip to use pre-built wheels (binary distributions)
# This avoids compilation and saves disk space on Pterodactyl

# Prefer binary packages
only-binary = :all:

# Don't build packages from source
no-build-isolation = false

# Use cache
cache-dir = /tmp/pip-cache

# Timeout for network operations (increased for slow servers)
default-timeout = 120

[install]
# Prefer binary packages over source distributions
prefer-binary

# No C extensions compilation
no-compile
